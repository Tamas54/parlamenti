# Forrás: 2012. évi XXXVI. törvény az Országgyűlésről
#         §§ 87, 104, 107, 109–118/A, 119
# Számítási alap: KSH STADAT mun0143 — 2025. évi nemzetgazdasági havi bruttó
#         átlagkereset (teljes munkaidőben alkalmazásban állók, teljes kör)
