alap_szamok:
  nev: "A rendszer központi fogaskereke (T) és érvényesség"
  ervenyesseg_kezdete: "2026-03-01"
  ervenyesseg_vege: "2027-02-28"
  ksh_bruttó_atlagkereset_2025_ft: 727496
  ksh_forras: >
    KSH nemzetgazdasági bruttó átlagkereset — az OGYH számítási alapjaként
    használt specifikus mutató (teljes munkaidős alkalmazottak, teljes kör;
    a közfoglalkoztatottakat nem vagy csak szűkített körben tartalmazó
    változat). NEM azonos a nyers 12-havi számtani átlaggal.
  ksh_kozelito_jelleg: >
    AZ ADATOK JELENLEG KÖZELÍTŐEK. A 727 496 Ft/hó értéket a 2026. március
    1-jétől érvényes T = 2 182 488 Ft-ból számoltuk vissza (T / 3) a
    2026-04-i audit forrásai alapján. Ez lényegesen magasabb, mint a
    KSH-gyorstájékoztatókból számolt nyers 12-havi átlag (~705 000 Ft),
    mert az Ogytv. 104. § a KSH egy specifikus, magasabb mutatójához
    igazodik (a közfoglalkoztatottak nélküli vagy szűkített kör).
    A pontos hivatalos OGYH-táblázat megjelenéséig (vagy a 2025-ös
    véglegesített KSH-adat közzétételéig) minden ebből számolt érték
    — T, iroda, munkatárs, lakhatás, bérkeret, fejkvóta stb. —
    a legjobb tudomásunk szerinti becslés, nem végleges hivatalos adat.
  tiszteletdij_alap_T_ft: 2182488
  keplet: "T = KSH bruttó havi átlagkereset × 3 = 727 496 × 3 = 2 182 488 Ft/hó"
  jogforras: "Ogytv. 104. § (1)"
  audit_2026_04:
    korabbi_T_ft: 2114811
    korabbi_ksh_ft: 704937
    korrekcio_forras: "Parlament.hu jogallas_es_javadalmazas + OGYH 2026-03-01 táblázat (2026-04 audit)"
    megjegyzes: >
      Az eredeti YAML-ben szereplő 704 937 Ft / 2 114 811 Ft a KSH
      gyorstájékoztatók havi adataiból számolt számtani átlag volt.
      A 2026-04 audit kimutatta, hogy az OGYH egy ennél magasabb KSH-mutatót
      használ, ezért a T hivatalos értéke 2 182 488 Ft. Minden származtatott
      keret ennek megfelelően módosítva. A különbség ~3,2%.
  megjegyzes: >
    T a tiszteletdíj alapja. Minden további egyéni és frakciós keret
    ebből származik szorzókkal. Évente március 1-jén frissül az előző
    évi KSH-adat alapján.

