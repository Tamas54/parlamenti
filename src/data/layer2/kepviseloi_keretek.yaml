# ------------------------------------------------------------------------------
# 4. GAZDÁLKODÁS, ELSZÁMOLÁS
# ------------------------------------------------------------------------------

gazdalkodas:
  nev: "Gazdálkodás és elszámolás"
  kategoria: "eljaras"
  jogforras: "Ogytv. 116–118/A. §"
  targyi_eszkozok: >
    A 113. és 114. § (3) keretből vásárolt eszközök az OGY Hivatala
    tulajdonát képezik; a frakció / független képviselő csak birtokolhatja
    a mandátum alatt (116. §).
  tamogatas_forrasa: "A 113–115. § keretét az OGY Hivatala biztosítja (117. §)."
  atcsoportositas: >
    A frakcióvezető a 112. § (4), 113. § (1) és (1a), 114. § (3), 115. §
    (4) és (6) keretei között mozgathat pénzt; tárgyhó előtti hónap 20-ig
    be kell jelenteni (118. § (1)).
  keretmaradvany: >
    Havi maradvány a jogosultsági hónap után is felhasználható.
    Év végén / mandátum megszűnésekor egyes egyéni keretek maradványa
    a frakció 113. § szerinti keretére csoportosul át (112. § (8), 118. § (5a)).
    Frakció megszűnése esetén a maradvány a következő OGY-ben is
    mandátummal rendelkező ugyanazon párt frakciójára szállhat.
  part_finanszirozas: >
    A frakcióvezető egyedi döntéssel, támogatói okirattal a keretmaradvány
    terhére támogatást nyújthat az országos listán mandátumot szerzett
    pártjának — átutalással, annak hitelintézeti számlájára (118/A. §).
  tullepes_szankcio: >
    A jogosulatlanul igénybe vett összeg és a parkolási szolgáltatás díja
    a tiszteletdíjból levonásra kerül, vagy visszafizetendő (112. § (10)).

