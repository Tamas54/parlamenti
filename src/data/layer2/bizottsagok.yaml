# ==============================================================================
# BIZOTTSÁGI RENDSZER — típusok, TAB, eljárás
# ==============================================================================
# Jogforrások: Ogytv. 15–21/A. §; 10/2014. (II. 24.) OGY hat. (Hsz.) 32. §,
#              40–48. §, 62. §, 69–72. §, 82. §
# A 2014-es reform kétlépcsős bizottsági szűrőrendszert vezetett be:
# tárgyaló bizottságok (szakpolitikai szűrés) → TAB (kodifikációs szintézis)
# ==============================================================================

bizottsagi_munka_alapok:
  nev: "Bizottsági munka — alapvetések"
  kategoria: "alap"
  jogforras: "Ogytv. 15. § (1)"
  leiras: >
    A bizottság az Országgyűlés munkaszerve: kezdeményez, javaslatot tesz,
    véleményez, meghatározott esetekben ügydöntő, és részt vesz a kormányzati
    munka ellenőrzésében. A plenáris ülést a bizottságok készítik elő; itt
    zajlik a szakmai-részletes munka, a plenárisra ideálisan már „előszűrt”
    anyag érkezik.
  mukodesi_ritmus:
    a_het: "plenáris ülési hét"
    b_het: "bizottsági és választókerületi hét"
    megjegyzes: "A bizottsági munka érdemi súlypontja a B-héten van, de az A-héten is tartanak üléseket — különösen a TAB."
  hatarozatkeptesse:
    hatarozatkeptesse_kuszob: "A tagok több mint fele jelen van"
    tanacskozokeptesse_kuszob: "A tagok több mint egyharmada jelen van"
    dontes_alapszabaly: "A jelenlévők több mint fele (ha házszabály eltérően nem rendelkezik)"
    kepviseleti_megbizas: "Az ilyen tagot jelenlevőnek kell tekinteni"
    jogforras: "Ogytv. 27/C. §"
  osszetetel: >
    A frakciók közötti létszámarány szerint, minden frakcióból annyi tag,
    amennyi arányos (Ogytv. 17. § (1)). Minden képviselő — kivéve kormánytag,
    miniszterelnöki politikai igazgató, államtitkár — legalább egy állandó
    bizottságban részt vehet (17. § (2)).
  deregulacios_albizottsag: "Minden állandó bizottságnak KÖTELEZŐ létrehoznia (Ogytv. 21. § (2))."

bizottsagtipusok:
  nev: "Bizottságtípusok áttekintése"
  kategoria: "alap"
  jogforras: "Ogytv. 16–21/A. §"
  tipusok:
    allando_bizottsag:
      nev: "Állandó bizottság"
      jogforras: "Ogytv. 16. § (1)"
      leiras: "Feladatköre a kormányzati feladatokhoz igazodik. Az Országgyűlés megalakulásakor hozza létre."
    torvenyalkotasi_bizottsag:
      nev: "Törvényalkotási Bizottság (TAB)"
      jogforras: "Ogytv. 21/A. §"
      leiras: "Külön szabályozással működik. A kétlépcsős bizottsági rendszer második szűrője, kodifikációs szintetizátor."
    vizsgalobizottsag:
      nev: "Vizsgálóbizottság"
      jogforras: "Ogytv."
      leiras: "Ad hoc alapon létrehozott, meghatározott ügy kivizsgálására szolgáló eseti bizottság."
    nemzetisegi_bizottsag:
      nev: "Nemzetiségeket képviselő bizottság"
      jogforras: "Ogytv.; Hsz. 45. § (4), (9)"
      leiras: "Külön jogállással működő bizottság. Túlterjeszkedést nem fogalmazhat meg, de más tárgyaló bizottságnál vagy a TAB-nál kezdeményezheti."
    paritasos_bizottsag:
      nev: "Paritásos bizottság"
      jogforras: "Ogytv. 17. § (4)"
      leiras: "Kormánypárti és ellenzéki tagok EGYENLŐ számban. A Mentelmi Bizottság kötelezően ilyen."

kotelezoen_letrehozando_bizottsagok:
  nev: "Kötelezően létrehozandó állandó bizottságok"
  kategoria: "alap"
  jogforras: "Ogytv. 16. § (2)"
  leiras: "Az Országgyűlésnek a megalakuláskor kötelező létrehoznia az alábbi 8 állandó bizottságot."
  bizottsagok:
