# ==============================================================================
# SZAVAZÁSI SZABÁLYOK
# ==============================================================================
# Milyen többség kell? Nyílt vagy titkos? Minősített vagy egyszerű?
# ==============================================================================

egyszeru_torveny:
  nev: "Egyszerű többségű törvény"
  szukseges_tobbseg: "A jelenlévő képviselők több mint fele"
  minositett_e: false
  mod: "nyilt_elektronikus"
  jogforras: "Alaptörvény T) cikk + Házszabály"

sarkalatos_torveny:
  nev: "Sarkalatos (kétharmados) törvény"
  szukseges_tobbseg: "A jelenlévő képviselők kétharmada"
  minositett_e: true
  mod: "nyilt_elektronikus"
  jogforras: "Alaptörvény T) cikk (4); Hsz. 48. § (8)"
  kulonleges: >
    Ha egy törvényben VEGYESEN vannak sarkalatos és egyszerű többségű
    rendelkezések (pl. „salátatörvény"), szegmentált szavazásra kell
    felkészülni: a minősített többségű rész külön, 2/3-dal; a többi
    egyszerű többséggel. A Hsz. 48. § (8) szerint ELŐSZÖR mindig a
    minősített többséget igénylő döntést kell meghozni.
  praktikus_kovetkezmeny: >
    199 fős OGY esetén: ha valamennyi képviselő jelen van, 2/3 =
    133 igen szavazat. A minősített többség biztosítása (vagy blokkolása)
    a padsor-logisztika egyik legfontosabb kérdése.
  kivetel_eljaras: "Kivételes eljárásnak NINCS HELYE sarkalatos rendelkezés elfogadására vagy módosítására (Hsz. 61. § (4) c))."
  pelda_tamak:
    - "Választójog (Alaptörvény XXIII. cikk (4))"
    - "Állampolgárság (G) cikk)"
    - "Nemzetiségek, egyházak"
    - "Családjog egyes elemei"
    - "Honvédelem"
    - "Bíróságok és ügyészség szervezete"
    - "Alkotmánybíróság, ÁSZ, MNB"
    - "Nemzetbiztonság, helyi önkormányzatok"

alaptorveny_modositas:
  nev: "Alaptörvény módosítása"
  szukseges_tobbseg: "Az összes képviselő kétharmada"
  minositett_e: true
  kulonleges: >
    NEM a jelenlévők, hanem az ÖSSZES országgyűlési képviselő kétharmada.
    Ez a különbség kritikus.
  mod: "nyilt_elektronikus"
  jogforras: "Alaptörvény S) cikk (2)"

hazszabaly_modositas:
  nev: "Házszabály módosítása"
  szukseges_tobbseg: "A jelenlévő képviselők kétharmada"
