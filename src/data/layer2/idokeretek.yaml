napirend_elotti:
  nev: "Napirend előtti felszólalás"
  leiras: >
    Az ülés napirendjének megállapítása előtt, legfeljebb öt percben a
    képviselő az Országgyűlést érintő bármely ügyben felszólalhat.
  altalanos_idokeret_perc: 5
  szereplok:
    miniszterelnok:
      idokeret_perc: 5
      valasz_lehet_e: true
      megjegyzes: "A miniszterelnök vagy az általa megjelölt miniszter válaszolhat."
    miniszter:
      idokeret_perc: 5
      valasz_lehet_e: true
    frakciovezeto:
      idokeret_perc: 5
      valasz_lehet_e: false
      megjegyzes: "Frakciónként egy napirend előtti felszólalás ülésnaponként."
    kepviselo:
      idokeret_perc: 5
      valasz_lehet_e: false
  viszonvalasz:
    lehet_e: true
    idokeret_perc: 1
    megjegyzes: "A napirend előtti felszólalásra adott válaszra a felszólaló 1 percben viszonválaszt mondhat."
  jogforras: "Házszabály — pontos §-szám Sprint 2-ben ellenőrizve"
  sprint1_figyelmezetes: >
    EZ EGY KEZDŐ TARTALOM. A pontos időkeretek és §-hivatkozások
    Sprint 2-ben kerülnek végleges ellenőrzésre.

